<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Sandbox 🎨</title>
  <style>
    body { padding: 2rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1e293b; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .search-container { position: relative; display: flex; align-items: center; margin-bottom: 1rem; max-width: 320px; color: #64748b; }
    .search-icon { position: absolute; left: 10px; pointer-events: auto; cursor: text; transition: color 0.2s ease; }
    .search-container:focus-within .search-icon, .search-icon.active { color: #3b82f6; }
    #search { width: 100%; padding: 8px 36px 8px 32px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 16px; transition: all 0.2s ease; color: #1e293b; }
    #search:hover { border-color: #94a3b8; }
    #search:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    #search::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
    .kbd-hint { position: absolute; right: 34px; padding: 1px 4px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 3px; font-size: 0.7rem; color: #334155; pointer-events: none; transition: opacity 0.2s; }
    .results-count { position: absolute; right: 34px; font-size: 0.75rem; font-weight: 600; color: #3b82f6; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    .clear-btn { position: absolute; right: 6px; opacity: 0; visibility: hidden; pointer-events: none; border: none; background: transparent; color: #334155; cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); transform: scale(0.8); }
    .clear-btn.visible { opacity: 1; visibility: visible; pointer-events: auto; transform: scale(1); }
    .clear-btn:hover { background: #f1f5f9; color: #0f172a; }
    .clear-btn:active { transform: scale(0.92); }

    #reset-search { background: none; border: none; padding: 0 4px; color: #3b82f6; text-decoration: underline; font: inherit; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
    #reset-search:hover { background: #eff6ff; color: #2563eb; }
    #reset-search:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; background: #eff6ff; }

    .box { display: flex; align-items: center; gap: 8px; margin-top: 1.5rem; }
    code {
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      font-size: 0.875rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      cursor: pointer;
      transition: all 0.1s ease-in-out;
    }
    code:hover { background: #e2e8f0; border-color: #cbd5e1; }
    code:active { transform: scale(0.98); }
    code:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 85px;
      user-select: none;
    }
    button:hover:not(.success) { background: #f8fafc; border-color: #94a3b8; }
    button:active { transform: scale(0.96); }
    button:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    button.success { background: #065f46; color: #fff; border-color: #065f46; }

    code.success { border-color: #065f46; background: #ecfdf5; }

    mark { background: #fef08a; border-radius: 2px; padding: 0 1px; color: inherit; }

    @keyframes check-pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes count-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .count-animate { animation: count-pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .shake { animation: shake 0.2s ease-in-out 0s 2; }
    .results-count.no-matches { color: #dc2626; }
    #search.no-matches:focus { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2); }
    .search-icon.no-matches { color: #dc2626 !important; }
    #no-results:not(.sr-only) { animation: fade-in-up 0.3s ease-out; }

    .icon-check { display: none; }
    button.success .icon-copy { display: none; }
    button.success .icon-check {
      display: inline-block;
      animation: check-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
  </style>
</head>
<body>
  <h1>Palette Sandbox 🎨</h1>
  <div class="search-container">
    <label for="search" class="sr-only">Search</label>
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="search" id="search" placeholder="Search..." autocomplete="off" enterkeyhint="search" inputmode="search" spellcheck="false" autocapitalize="none" autocorrect="off" aria-keyshortcuts="/ Control+K Meta+K">
    <span class="kbd-hint" id="kbd-hint" aria-hidden="true">/</span>
    <span id="results-count" class="results-count" aria-hidden="true"></span>
    <button id="clear-search" type="button" class="clear-btn" aria-label="Clear search (Esc)" title="Clear search (Esc)" aria-keyshortcuts="Escape">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <p>Micro-UX: Enhanced "Copy to Clipboard" with tactile feedback.</p>
  <div class="box">
    <code id="command-code" tabindex="0" role="button" title="Click to copy">pnpm add @palette/ux</code>
    <button id="copy-button" type="button" aria-label="Copy command" title="Copy command">
      <svg class="icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      <span id="button-text">Copy</span>
    </button>
  </div>
  <p id="no-results" class="sr-only" style="display: none; position: static; width: auto; height: auto; clip: auto; margin-top: 1rem; color: #64748b; font-size: 0.875rem;">
    No matches found for "<span id="search-term" style="font-weight: 500; color: #1e293b;"></span>". <button id="reset-search" type="button" aria-label="Clear search (Esc)" title="Clear search (Esc)">Clear search</button>
  </p>
  <div id="announcement" aria-live="polite" class="sr-only"></div>
  <script>
    const searchInput = document.getElementById('search'),
          clearButton = document.getElementById('clear-search'),
          keyboardHint = document.getElementById('kbd-hint'),
          noResultsContainer = document.getElementById('no-results'),
          searchTermDisplay = document.getElementById('search-term'),
          resetButton = document.getElementById('reset-search'),
          ariaAnnouncement = document.getElementById('announcement'),
          resultsCountBadge = document.getElementById('results-count'),
          searchIcon = document.querySelector('.search-icon');

    const updateUI = () => {
      const query = searchInput.value;
      const hasQuery = query.length > 0;
      const isSearchFocused = document.activeElement === searchInput;

      clearButton.classList.toggle('visible', hasQuery);
      searchIcon.classList.toggle('active', hasQuery);
      keyboardHint.style.opacity = (hasQuery || isSearchFocused) ? '0' : '1';
      resultsCountBadge.style.opacity = hasQuery ? '1' : '0';

      const contentItems = [
        document.querySelector('.box'),
        document.querySelector('p:not(.sr-only):not(#no-results)')
      ];

      let matchCount = 0;
      contentItems.forEach(item => {
        const target = item.tagName === 'DIV' ? item.querySelector('code') || item : item;
        if (!target.dataset.original) target.dataset.original = target.innerHTML;

        const isMatch = !hasQuery || target.textContent.toLowerCase().includes(query.toLowerCase());
        item.style.display = isMatch ? (item.tagName === 'DIV' ? 'flex' : 'block') : 'none';

        if (hasQuery && isMatch) {
          const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const highlightRegex = new RegExp(`(${escapedQuery})`, 'gi');
          target.innerHTML = target.dataset.original.replace(highlightRegex, '<mark>$1</mark>');
        } else {
          target.innerHTML = target.dataset.original;
        }

        if (isMatch) matchCount++;
      });

      if (hasQuery && matchCount === 0) {
        const displayQuery = query.length > 32 ? query.substring(0, 32) + '...' : query;
        searchTermDisplay.textContent = displayQuery;
        searchTermDisplay.title = query.length > 32 ? query : '';
        noResultsContainer.style.display = 'block';
        noResultsContainer.classList.remove('sr-only');

        searchInput.classList.remove('shake');
        void searchInput.offsetWidth;
        searchInput.classList.add('shake');
        resultsCountBadge.classList.add('no-matches');
        searchInput.classList.add('no-matches');
        searchIcon.classList.add('no-matches');
      } else {
        noResultsContainer.style.display = 'none';
        noResultsContainer.classList.add('sr-only');
        resultsCountBadge.classList.remove('no-matches');
        searchInput.classList.remove('no-matches');
        searchIcon.classList.remove('no-matches');
      }

      if (hasQuery && resultsCountBadge.textContent !== String(matchCount)) {
        resultsCountBadge.classList.remove('count-animate');
        void resultsCountBadge.offsetWidth;
        resultsCountBadge.classList.add('count-animate');
      }

      resultsCountBadge.textContent = hasQuery ? matchCount : '';
      ariaAnnouncement.textContent = hasQuery
        ? (matchCount === 0 ? 'No matches found' : `${matchCount} match${matchCount !== 1 ? 'es' : ''} found`)
        : '';
    };
    ['input', 'focus', 'blur'].forEach(event => searchInput.addEventListener(event, updateUI));
    searchInput.addEventListener('focus', () => searchInput.select());
    searchIcon.addEventListener('click', () => searchInput.focus());

    const resetSearch = () => {
      searchInput.value = '';
      searchInput.focus();
      updateUI();
      ariaAnnouncement.textContent = 'Search cleared';
    };

    clearButton.addEventListener('click', resetSearch);
    resetButton.addEventListener('click', resetSearch);

    window.addEventListener('keydown', event => {
      const isEditable = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable;
      const isSearchShortcut = event.key === '/' || ((event.ctrlKey || event.metaKey) && event.key === 'k');

      if (isSearchShortcut && !isEditable) {
        event.preventDefault();
        searchInput.focus();
      }

      if (event.key === 'Escape') {
        if (searchInput.value) {
          searchInput.value = '';
          updateUI();
          ariaAnnouncement.textContent = 'Search cleared';
        } else if (document.activeElement === searchInput) {
          searchInput.blur();
        }
      }

      if ((event.key === 'ArrowDown' || event.key === 'Enter') && document.activeElement === searchInput) {
        const firstResult = [commandCode, copyButton, resetButton].find(el => el.offsetParent !== null);
        if (firstResult) {
          event.preventDefault();
          firstResult.focus();
        }
      }

      if (event.key === 'ArrowUp' && (document.activeElement === commandCode || document.activeElement === copyButton || document.activeElement === resetButton)) {
        event.preventDefault();
        searchInput.focus();
      }
    });

    const copyButton = document.getElementById('copy-button'),
          buttonText = document.getElementById('button-text'),
          commandCode = document.getElementById('command-code');

    let feedbackTimeoutId;

    const copyToClipboard = () => {
      if (!navigator.clipboard) return;
      navigator.clipboard.writeText(commandCode.textContent).then(() => {
        clearTimeout(feedbackTimeoutId);
        buttonText.textContent = 'Copied!';
        copyButton.classList.add('success');
        commandCode.classList.add('success');
        copyButton.setAttribute('aria-label', 'Command copied');
        ariaAnnouncement.textContent = 'Copied to clipboard';

        feedbackTimeoutId = setTimeout(() => {
          buttonText.textContent = 'Copy';
          copyButton.classList.remove('success');
          commandCode.classList.remove('success');
          copyButton.setAttribute('aria-label', 'Copy command');
          if (ariaAnnouncement.textContent === 'Copied to clipboard') {
            ariaAnnouncement.textContent = '';
          }
        }, 2000);
      });
    };

    copyButton.addEventListener('click', copyToClipboard);
    commandCode.addEventListener('click', copyToClipboard);
    commandCode.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        copyToClipboard();
      }
    });
  </script>
</body>
</html>
