<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Sandbox 🎨</title>
  <style>
    body { padding: 2rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1e293b; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .search-container { position: relative; display: flex; align-items: center; margin-bottom: 1rem; max-width: 320px; color: #64748b; }
    .search-icon { position: absolute; left: 10px; pointer-events: none; transition: color 0.2s ease; }
    .search-container:focus-within .search-icon { color: #3b82f6; }
    #search { width: 100%; padding: 8px 36px 8px 32px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.875rem; transition: all 0.2s ease; color: #1e293b; }
    #search:hover { border-color: #94a3b8; }
    #search:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    #search::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
    .kbd-hint { position: absolute; right: 34px; padding: 1px 4px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 3px; font-size: 0.7rem; color: #334155; pointer-events: none; transition: opacity 0.2s; }
    .clear-btn { position: absolute; right: 6px; opacity: 0; visibility: hidden; pointer-events: none; border: none; background: transparent; color: #334155; cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); transform: scale(0.8); }
    .clear-btn.visible { opacity: 1; visibility: visible; pointer-events: auto; transform: scale(1); }
    .clear-btn:hover { background: #f1f5f9; color: #0f172a; }
    .clear-btn:active { transform: scale(0.92); }
    .box { display: flex; align-items: center; gap: 8px; margin-top: 1.5rem; }
    code {
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      font-size: 0.875rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      cursor: pointer;
      transition: all 0.1s ease-in-out;
    }
    code:hover { background: #e2e8f0; border-color: #cbd5e1; }
    code:active { transform: scale(0.98); }
    code:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 85px;
      user-select: none;
    }
    button:hover:not(.success) { background: #f8fafc; border-color: #94a3b8; }
    button:active { transform: scale(0.96); }
    button:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    button.success { background: #065f46; color: #fff; border-color: #065f46; }

    code.success { border-color: #065f46; background: #ecfdf5; }

    @keyframes check-pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .icon-check { display: none; }
    button.success .icon-copy { display: none; }
    button.success .icon-check {
      display: inline-block;
      animation: check-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
  </style>
</head>
<body>
  <h1>Palette Sandbox 🎨</h1>
  <div class="search-container">
    <label for="search" class="sr-only">Search</label>
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="search" id="search" placeholder="Search..." autocomplete="off" enterkeyhint="search" spellcheck="false" autocapitalize="none" autocorrect="off" aria-keyshortcuts="/ Control+K Meta+K">
    <span class="kbd-hint" id="kbd-hint" aria-hidden="true">/</span>
    <button id="clear-search" type="button" class="clear-btn" aria-label="Clear search (Esc)" title="Clear search (Esc)" aria-keyshortcuts="Escape">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <p>Micro-UX: Enhanced "Copy to Clipboard" with tactile feedback.</p>
  <div class="box">
    <code id="command-code" tabindex="0" role="button" title="Click to copy">pnpm add @palette/ux</code>
    <button id="copy-button" type="button" aria-label="Copy command" title="Copy command">
      <svg class="icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      <span id="button-text">Copy</span>
    </button>
  </div>
  <div id="announcement" aria-live="polite" class="sr-only"></div>
  <script>
    const search = document.getElementById('search'), clear = document.getElementById('clear-search'), hint = document.getElementById('kbd-hint');
    const ui = () => {
      const v = search.value.length > 0, f = document.activeElement === search;
      clear.classList.toggle('visible', v);
      hint.style.opacity = (v || f) ? '0' : '1';
    };
    ['input', 'focus', 'blur'].forEach(e => search.addEventListener(e, ui));
    search.addEventListener('focus', () => search.select());
    clear.addEventListener('click', () => { search.value = ''; search.focus(); ui(); });
    window.addEventListener('keydown', e => {
      const ed = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable;
      const isSearchShortcut = e.key === '/' || ((e.ctrlKey || e.metaKey) && e.key === 'k');
      if (isSearchShortcut && !ed) { e.preventDefault(); search.focus(); }
      if (e.key === 'Escape' && document.activeElement === search) {
        if (search.value) { search.value = ''; ui(); } else search.blur();
      }
    });

    const btn = document.getElementById('copy-button'), txt = document.getElementById('button-text'),
          ann = document.getElementById('announcement'), code = document.getElementById('command-code');
    let tid;
    const copy = () => {
      if (!navigator.clipboard) return;
      navigator.clipboard.writeText(code.textContent).then(() => {
        clearTimeout(tid);
        txt.textContent = 'Copied!';
        btn.classList.add('success');
        code.classList.add('success');
        btn.setAttribute('aria-label', 'Command copied');
        ann.textContent = 'Copied to clipboard';
        tid = setTimeout(() => {
          txt.textContent = 'Copy';
          btn.classList.remove('success');
          code.classList.remove('success');
          btn.setAttribute('aria-label', 'Copy command');
          ann.textContent = '';
        }, 2000);
      });
    };
    btn.addEventListener('click', copy);
    code.addEventListener('click', copy);
    code.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copy(); } });
  </script>
</body>
</html>
