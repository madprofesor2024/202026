<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { padding: 2rem; font-family: sans-serif; }
    .box { display: flex; align-items: center; gap: 8px; }
    code { background: #f1f5f9; padding: 6px 12px; border-radius: 4px; border: 1px solid #e2e8f0; font-size: 0.875rem; }
    button { display: flex; align-items: center; gap: 4px; padding: 6px 12px; cursor: pointer; border-radius: 4px; border: 1px solid #cbd5e1; background: #fff; font-size: 0.875rem; transition: all 0.2s; }
    button:hover:not(.success) { background: #f8fafc; }
    button:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    button.success { background: #065f46; color: #fff; border-color: #065f46; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
  </style>
</head>
<body>
  <h1>Palette Sandbox 🎨</h1>
  <p>Micro-UX: Accessible Copy to Clipboard</p>
  <div class="box">
    <code id="c">pnpm add @palette/ux</code>
    <button id="b" aria-label="Copy command">
      <svg id="i" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <span id="bt">Copy</span>
    </button>
  </div>
  <div id="a" aria-live="polite" class="sr-only"></div>
  <script>
    const b = document.getElementById('b'), bt = document.getElementById('bt'), a = document.getElementById('a'), t = document.getElementById('c').textContent, i = document.getElementById('i');
    let tid;
    b.onclick = () => {
      if (!navigator.clipboard) return;
      navigator.clipboard.writeText(t).then(() => {
        if (tid) clearTimeout(tid);
        bt.textContent = 'Copied!'; b.classList.add('success'); i.style.display = 'none';
        b.setAttribute('aria-label', 'Command copied'); a.textContent = 'Copied to clipboard';
        tid = setTimeout(() => {
          bt.textContent = 'Copy'; b.classList.remove('success'); i.style.display = 'block';
          b.setAttribute('aria-label', 'Copy command'); a.textContent = ''; tid = null;
        }, 2000);
      });
    };
  </script>
</body>
</html>
